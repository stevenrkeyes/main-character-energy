<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chinese Character Tables</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=Noto+Sans+SC:wght@500;700&family=Source+Serif+4:opsz,wght@8..60,600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body>
    <div class="app">
      <main class="workspace">
        <header class="page-header">
          <h1>Chinese Character Tables</h1>
          <p>
            Most frequent character per onset × coda cell, by tone, from
            <span id="corpus-label">SUBTLEX-CH</span>.
          </p>
        </header>
        <div id="tables" class="tables" aria-live="polite"></div>
      </main>

      <aside class="panel" aria-label="View controls">
        <section class="panel-section">
          <h2>Phonemic analysis</h2>
          <label class="radio">
            <input type="radio" name="analysis" value="pinyin" checked />
            <span>pinyin</span>
          </label>
        </section>

        <section class="panel-section">
          <h2>Filter</h2>
          <label class="radio">
            <input type="radio" name="filter" value="all" checked />
            <span>all</span>
          </label>
        </section>

        <section class="panel-section">
          <h2>Display</h2>
          <label class="radio">
            <input type="checkbox" id="hide-lowest-freq" />
            <span>Hide lowest frequency</span>
          </label>
          <label class="radio">
            <input type="checkbox" id="hide-empty-axes" />
            <span>Hide empty rows/columns</span>
          </label>
        </section>

        <section class="panel-section">
          <h2>HSK filter</h2>
          <div class="radio-grid">
            <label class="radio">
              <input type="radio" name="hsk" value="1" />
              <span>1</span>
            </label>
            <label class="radio">
              <input type="radio" name="hsk" value="2" />
              <span>2</span>
            </label>
            <label class="radio">
              <input type="radio" name="hsk" value="3" />
              <span>3</span>
            </label>
            <label class="radio">
              <input type="radio" name="hsk" value="4" />
              <span>4</span>
            </label>
            <label class="radio">
              <input type="radio" name="hsk" value="5" />
              <span>5</span>
            </label>
            <label class="radio">
              <input type="radio" name="hsk" value="6" />
              <span>6</span>
            </label>
            <label class="radio radio-wide">
              <input type="radio" name="hsk" value="7-9" />
              <span>7–9</span>
            </label>
            <label class="radio radio-wide">
              <input type="radio" name="hsk" value="all" checked />
              <span>No filter</span>
            </label>
          </div>
        </section>

        <section class="panel-section">
          <h2>Corpus</h2>
          <label class="radio">
            <input type="radio" name="corpus" value="SUBTLEX-CH" checked />
            <span>SUBTLEX-CH</span>
          </label>
        </section>

        <section class="panel-section">
          <h2>Gloss</h2>
          <label class="radio">
            <input type="radio" name="gloss" value="custom" checked />
            <span>Simple gloss</span>
          </label>
          <label class="radio">
            <input type="radio" name="gloss" value="unihan" />
            <span>Unihan</span>
          </label>
          <label class="radio">
            <input type="radio" name="gloss" value="cedict" />
            <span>CC-CEDICT</span>
          </label>
        </section>

        <div class="panel-footer">
          <p class="panel-note" id="status">Loading frequency tables…</p>
          <p class="panel-attribution">
            Glosses:
            <a href="https://www.unicode.org/charts/unihan.html">Unihan</a>
            and
            <a href="https://www.mdbg.net/chinese/dictionary?page=cc-cedict">CC-CEDICT</a>
            (<a href="https://creativecommons.org/licenses/by-sa/4.0/">CC BY-SA 4.0</a>).
          </p>
        </div>
      </aside>
    </div>
    <script type="module" src="assets/app.js"></script>
  </body>
</html>
