<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Main Character Energy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=Noto+Sans+SC:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="asses/styles.css" />
  </head>
  <body>
    <div class="app panel-hidden">
      <main class="workspace">
        <header class="page-header">
          <h1>Main Character Energy</h1>
        </header>
        <div id="tables" class="tables" aria-live="polite"></div>
      </main>

      <aside class="panel" id="panel" aria-label="View controls">
        <div class="panel-toolbar">
          <button
            type="button"
            class="panel-toggle"
            id="hide-panel-button"
            aria-controls="panel"
            aria-expanded="false"
            aria-label="Hide panel"
            title="Hide panel"
          >
            ›
          </button>
        </div>
        <section class="panel-section">
          <h2>Phonemic analysis</h2>
          <label class="radio">
            <input type="radio" name="analysis" value="pinyin" checked />
            <span>pinyin</span>
          </label>
        </section>

        <section class="panel-section">
          <h2>Filter</h2>
          <label class="radio">
            <input type="radio" name="filter" value="all" checked />
            <span>all</span>
          </label>
        </section>

        <section class="panel-section">
          <h2>Display</h2>
          <label class="radio">
            <input type="checkbox" id="hide-lowest-freq" checked />
            <span>Hide lowest frequency</span>
          </label>
          <label class="radio">
            <input type="checkbox" id="hide-empty-axes" checked />
            <span>Hide empty rows/columns</span>
          </label>
        </section>

        <section class="panel-section">
          <h2>HSK filter</h2>
          <div class="radio-grid">
            <label class="radio">
              <input type="radio" name="hsk" value="1" />
              <span>1</span>
            </label>
            <label class="radio">
              <input type="radio" name="hsk" value="2" />
              <span>2</span>
            </label>
            <label class="radio">
              <input type="radio" name="hsk" value="3" />
              <span>3</span>
            </label>
            <label class="radio">
              <input type="radio" name="hsk" value="4" />
              <span>4</span>
            </label>
            <label class="radio">
              <input type="radio" name="hsk" value="5" />
              <span>5</span>
            </label>
            <label class="radio">
              <input type="radio" name="hsk" value="6" />
              <span>6</span>
            </label>
            <label class="radio radio-wide">
              <input type="radio" name="hsk" value="7-9" />
              <span>7–9</span>
            </label>
            <label class="radio radio-wide">
              <input type="radio" name="hsk" value="all" checked />
              <span>No filter</span>
            </label>
          </div>
        </section>

        <section class="panel-section">
          <h2>Corpus</h2>
          <label class="radio">
            <input type="radio" name="corpus" value="SUBTLEX-CH" checked />
            <span>SUBTLEX-CH</span>
          </label>
        </section>

        <section class="panel-section">
          <h2>Gloss</h2>
          <label class="radio">
            <input type="radio" name="gloss" value="custom" checked />
            <span>Simple gloss</span>
          </label>
          <label class="radio">
            <input type="radio" name="gloss" value="unihan" />
            <span>Unihan</span>
          </label>
          <label class="radio">
            <input type="radio" name="gloss" value="cedict" />
            <span>CC-CEDICT</span>
          </label>
        </section>

        <div class="panel-footer">
          <p class="panel-attribution">
            Glosses:
            <a href="https://www.unicode.org/charts/unihan.html">Unihan</a>
            and
            <a href="https://www.mdbg.net/chinese/dictionary?page=cc-cedict">CC-CEDICT</a>
            (<a href="https://creativecommons.org/licenses/by-sa/4.0/">CC BY-SA 4.0</a>).
          </p>
        </div>
      </aside>
    </div>
    <p class="load-status" id="status">Loading frequency tables… [0 / ? characters]</p>
    <button
      type="button"
      class="panel-show"
      id="show-panel-button"
      aria-controls="panel"
      aria-expanded="false"
      aria-label="Show panel"
      title="Show panel"
    >
      ‹
    </button>
    <script type="module" src="asses/app.js"></script>
  </body>
</html>
